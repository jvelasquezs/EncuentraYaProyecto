<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuentra Ya | Geolocalización de Comercios</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --bg-primary: #0b0f19;
            --bg-secondary: #151c2c;
            --bg-accent: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --brand-color: #00ffa3;
            --brand-gradient: linear-gradient(135deg, #00ffa3 0%, #00b8ff 100%);
            --danger: #ff4a6b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR PREMIUM --- */
        #sidebar {
            width: 400px;
            background: var(--bg-secondary);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            z-index: 10;
            transition: all 0.3s ease;
        }

        .brand-header {
            padding: 24px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-header i {
            font-size: 24px;
            background: var(--brand-gradient);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-header h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .brand-header span {
            color: var(--brand-color);
        }

        .content-tabs {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-note {
            background: rgba(0, 184, 255, 0.1);
            border-left: 3px solid #00b8ff;
            padding: 12px;
            border-radius: 4px;
            font-size: 12px;
            color: #b4e4ff;
            margin-bottom: 20px;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        /* --- LISTA DE COMERCIOS EN SIDEBAR --- */
        .store-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .store-card {
            background: var(--bg-accent);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            gap: 14px;
            align-items: flex-start;
        }

        .store-card:hover {
            border-color: var(--brand-color);
            box-shadow: 0 0 20px rgba(0, 255, 163, 0.1);
            transform: translateY(-2px);
        }

        .store-card-logo {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            object-fit: cover;
            flex-shrink: 0;
            border: 2px solid rgba(0, 255, 163, 0.2);
        }

        .store-card-info h3 {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .store-card-info p {
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .store-card-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 8px;
        }

        .mini-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
        }

        .mini-badge-crypto {
            background: rgba(0, 255, 163, 0.1);
            color: var(--brand-color);
            border: 1px solid rgba(0, 255, 163, 0.2);
        }

        .cta-register {
            display: block;
            width: 100%;
            text-align: center;
            background: var(--brand-gradient);
            color: #05070f;
            font-weight: 700;
            font-size: 14px;
            padding: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 255, 163, 0.3);
            text-decoration: none;
            margin-top: 24px;
        }

        .cta-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 255, 163, 0.5);
        }

        .stats-bar {
            padding: 12px 24px;
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stats-bar .count {
            color: var(--brand-color);
            font-weight: 700;
        }

        /* --- MAPA --- */
        #map {
            flex: 1;
            height: 100%;
            background: var(--bg-primary);
        }

        /* --- Personalización de los Popups de Leaflet --- */
        .leaflet-popup-content-wrapper {
            background: var(--bg-secondary) !important;
            color: var(--text-main) !important;
            border: 1.5px solid rgba(0, 255, 163, 0.25);
            border-radius: 20px !important;
            padding: 0 !important;
            box-shadow: 0 10px 40px rgba(0, 255, 163, 0.15), 0 25px 60px rgba(0,0,0,0.8) !important;
            min-width: 360px;
        }

        .leaflet-popup-content {
            margin: 0 !important;
            width: auto !important;
        }

        .leaflet-popup-tip {
            background: var(--bg-secondary) !important;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* --- POPUP CARD PREMIUM --- */
        .popup-card {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .popup-header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 18px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .popup-logo {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            object-fit: cover;
            border: 2px solid rgba(0, 255, 163, 0.4);
            flex-shrink: 0;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
        }

        .popup-logo:hover {
            transform: scale(1.08);
            border-color: var(--brand-color);
            box-shadow: 0 0 15px rgba(0, 255, 163, 0.4);
        }

        .popup-header-info h3 {
            font-size: 16px;
            font-weight: 700;
            color: var(--brand-color);
            margin: 0 0 2px 0;
        }

        .popup-header-info .popup-rif {
            font-size: 11px;
            color: var(--text-muted);
            font-family: monospace;
        }

        .popup-header-info .popup-desc {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
            line-height: 1.3;
        }

        .popup-section {
            padding: 12px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .popup-section-title {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 8px;
        }

        .badge-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .badge {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-crypto {
            background: rgba(0, 255, 163, 0.1);
            color: var(--brand-color);
            border: 1px solid rgba(0, 255, 163, 0.2);
        }

        .badge-platform {
            background: rgba(0, 184, 255, 0.1);
            color: #00b8ff;
            border: 1px solid rgba(0, 184, 255, 0.2);
        }

        /* Contacto */
        .contact-links {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .contact-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            padding: 6px 10px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease;
            color: #cbd5e1 !important;
        }

        .contact-btn:hover {
            transform: translateY(-1px);
        }

        .contact-btn-whatsapp {
            background: rgba(37, 211, 102, 0.15);
            color: #ffffff;
            border: 1px solid rgba(37, 211, 102, 0.25);
        }
        .contact-btn-whatsapp i {
            color: #25d366;
        }

        .contact-btn-instagram {
            background: rgba(225, 48, 108, 0.15);
            color: #ffffff;
            border: 1px solid rgba(225, 48, 108, 0.25);
        }
        .contact-btn-instagram i {
            color: #e1306c;
        }

        .contact-btn-phone {
            background: rgba(0, 184, 255, 0.1);
            color: #ffffff;
            border: 1px solid rgba(0, 184, 255, 0.2);
        }
        .contact-btn-phone i {
            color: #00b8ff;
        }

        .contact-btn-email {
            background: rgba(255, 193, 7, 0.1);
            color: #ffffff;
            border: 1px solid rgba(255, 193, 7, 0.2);
        }
        .contact-btn-email i {
            color: #ffc107;
        }

        /* Productos en popup */
        .popup-products {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 6px;
        }

        .popup-products::-webkit-scrollbar {
            height: 4px;
        }

        .popup-products::-webkit-scrollbar-track {
            background: var(--bg-accent);
            border-radius: 4px;
        }

        .popup-products::-webkit-scrollbar-thumb {
            background: var(--brand-color);
            border-radius: 4px;
        }

        .popup-product-card {
            flex-shrink: 0;
            width: 110px;
            background: var(--bg-accent);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: border-color 0.2s ease;
        }

        .popup-product-card:hover {
            border-color: var(--brand-color);
        }

        .popup-product-card img {
            width: 100%;
            height: 70px;
            object-fit: cover;
        }

        .popup-product-card .prod-info {
            padding: 6px 8px;
        }

        .popup-product-card .prod-name {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-main);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.3;
        }

        .popup-product-card .prod-price {
            font-size: 12px;
            font-weight: 700;
            color: var(--brand-color);
            margin-top: 4px;
        }

        .popup-no-products {
            font-size: 12px;
            color: var(--text-muted);
            font-style: italic;
        }

        /* Modificar el estilo del mapa de OpenStreetMap a un tono más oscuro */
        .leaflet-layer,
        .leaflet-control-zoom-in,
        .leaflet-control-zoom-out {
            filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
        }

        /* --- BOTÓN MI UBICACIÓN --- */
        .btn-my-location {
            position: absolute;
            bottom: 30px;
            right: 16px;
            z-index: 1000;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.12);
            background: var(--bg-secondary);
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .btn-my-location:hover {
            background: var(--brand-color);
            color: #0b0f19;
            border-color: var(--brand-color);
            box-shadow: 0 0 20px rgba(0, 255, 163, 0.4);
            transform: scale(1.08);
        }

        .btn-my-location.locating {
            animation: pulse-locate 1.2s infinite;
            border-color: var(--brand-color);
            color: var(--brand-color);
        }

        @keyframes pulse-locate {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0, 255, 163, 0.4); }
            50% { box-shadow: 0 0 0 12px rgba(0, 255, 163, 0); }
        }

        /* --- MARCADOR PERSONALIZADO DE TIENDA --- */
        .store-marker {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .store-marker-label {
            background: rgba(11, 15, 25, 0.92);
            color: #f8fafc;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 11px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 6px;
            white-space: nowrap;
            border: 1px solid rgba(255, 255, 255, 0.15);
            margin-bottom: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            max-width: 160px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .store-marker-icon {
            width: 36px;
            height: 36px;
            background: #111827;
            border: 2.5px solid #1f2937;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.6);
            transition: all 0.25s ease;
        }

        .store-marker:hover .store-marker-icon {
            background: #1f2937;
            border-color: var(--brand-color);
            box-shadow: 0 0 16px rgba(0, 255, 163, 0.35);
        }

        .store-marker:hover .store-marker-label {
            border-color: var(--brand-color);
            color: var(--brand-color);
        }

        .store-marker-icon i {
            transform: rotate(45deg);
            font-size: 15px;
            color: #f8fafc;
        }

        .store-marker:hover .store-marker-icon i {
            color: var(--brand-color);
        }

        /* --- MARCADOR DE USUARIO --- */
        .user-location-marker {
            width: 20px;
            height: 20px;
            background: #3b82f6;
            border: 3px solid #fff;
            border-radius: 50%;
            box-shadow: 0 0 0 6px rgba(59, 130, 246, 0.3), 0 2px 8px rgba(0, 0, 0, 0.4);
            animation: user-pulse 2s infinite;
        }

        @keyframes user-pulse {
            0%, 100% { box-shadow: 0 0 0 6px rgba(59, 130, 246, 0.3), 0 2px 8px rgba(0, 0, 0, 0.4); }
            50% { box-shadow: 0 0 0 14px rgba(59, 130, 246, 0), 0 2px 8px rgba(0, 0, 0, 0.4); }
        }

        /* Brand Header Actions & Collapsing styles */
        .brand-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .brand-header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-back-dashboard {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            text-decoration: none;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }
        .btn-back-dashboard:hover {
            background: rgba(0, 255, 163, 0.12);
            border-color: var(--brand-color);
            color: var(--brand-color);
        }
        .btn-back-dashboard i {
            color: inherit !important;
            -webkit-text-fill-color: inherit !important;
            background: none !important;
            background-clip: unset !important;
            font-size: 14px !important;
        }

        .btn-register-header {
            display: none; /* Hidden on desktop */
        }
        .btn-register-header span {
            color: #05070f !important;
            -webkit-text-fill-color: #05070f !important;
            background: none !important;
            background-clip: unset !important;
        }
        .btn-register-header i {
            color: #05070f !important;
            -webkit-text-fill-color: #05070f !important;
            background: none !important;
            background-clip: unset !important;
            font-size: 13px !important;
        }

        .btn-toggle-sidebar-trigger {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: var(--text-main);
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .btn-toggle-sidebar-trigger:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--brand-color);
            color: var(--brand-color);
        }

        .btn-map-toggle-sidebar {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 1000;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: var(--bg-secondary);
            color: var(--brand-color);
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            transition: all 0.2s ease;
        }

        .btn-map-toggle-sidebar:hover {
            background: var(--brand-color);
            color: #0b0f19;
            box-shadow: 0 0 12px rgba(0, 255, 163, 0.4);
        }

        #sidebar.collapsed {
            margin-left: -400px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            #sidebar {
                width: 100%;
                height: 40vh;
                transition: all 0.3s ease;
            }
            #sidebar.collapsed {
                height: 60px; /* Only show header */
                margin-left: 0;
            }
            #sidebar.collapsed .content-tabs,
            #sidebar.collapsed .stats-bar {
                display: none;
            }
            #map {
                height: 60vh;
                transition: all 0.3s ease;
            }
            #sidebar.collapsed ~ #map {
                height: calc(100vh - 60px);
            }
            .btn-register-header {
                display: inline-flex;
                background: var(--brand-gradient);
                color: #05070f;
                font-weight: 700;
                font-size: 11px;
                padding: 6px 12px;
                border-radius: 6px;
                text-decoration: none;
                align-items: center;
                gap: 5px;
            }
            .btn-register-header:hover {
                box-shadow: 0 0 12px rgba(0, 255, 163, 0.4);
            }
        }

        @media (max-width: 380px) {
            .btn-register-header span {
                display: none;
            }
            .btn-register-header {
                padding: 6px 10px;
            }
        }

        /* --- LIGHTBOX MULTIMEDIA --- */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 300000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(5, 7, 15, 0.95);
            justify-content: center;
            align-items: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
            animation: fadeIn 0.25s ease-out;
        }
        .lightbox img {
            max-width: 85%;
            max-height: 85%;
            border-radius: 20px;
            border: 3px solid var(--brand-color);
            box-shadow: 0 0 50px rgba(0, 255, 163, 0.4);
            transform: scale(0.9);
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .lightbox.active {
            display: flex;
        }
        .lightbox.active img {
            transform: scale(1);
        }
        .close-lightbox {
            position: absolute;
            top: 24px;
            right: 32px;
            color: #fff;
            font-size: 44px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
        }
        .close-lightbox:hover {
            color: var(--brand-color);
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* --- MODAL DETALLES DE PRODUCTO --- */
        .product-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(11, 15, 25, 0.85);
            backdrop-filter: blur(8px);
            z-index: 250000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .product-modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .product-modal-card {
            background: var(--bg-secondary);
            border: 1.5px solid rgba(0, 255, 163, 0.25);
            border-radius: 20px;
            width: 90%;
            max-width: 440px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 30px rgba(0, 255, 163, 0.1);
            position: relative;
            transform: scale(0.9);
            transition: all 0.3s ease;
        }

        .product-modal-overlay.active .product-modal-card {
            transform: scale(1);
        }

        .product-modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 32px;
            font-weight: bold;
            color: var(--text-muted);
            cursor: pointer;
            z-index: 10;
            transition: color 0.2s ease;
        }

        .product-modal-close:hover {
            color: var(--danger);
        }

        .product-modal-card img {
            width: 100%;
            height: 240px;
            object-fit: cover;
            border-bottom: 1.5px solid rgba(255, 255, 255, 0.05);
        }

        .product-modal-info {
            padding: 24px;
        }

        .product-modal-info h3 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .product-modal-badge {
            display: inline-block;
            background: rgba(0, 255, 163, 0.1);
            color: var(--brand-color);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
            border: 1px solid rgba(0, 255, 163, 0.15);
        }

        .product-modal-info p {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 24px;
            word-break: break-word;
        }

        .product-modal-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 16px;
        }

        .product-modal-price {
            font-size: 22px;
            font-weight: 700;
            color: var(--brand-color);
        }

        .product-modal-stock {
            font-size: 12px;
            font-weight: 600;
            color: #ff9f43;
            background: rgba(255, 159, 67, 0.1);
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid rgba(255, 159, 67, 0.15);
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="brand-header">
            <div style="display: flex; align-items: center; gap: 10px; flex: 1;">
                <a href="/dashboard" class="btn-back-dashboard" title="Ir al Panel de Control">
                    <i class="fa-solid fa-arrow-left"></i>
                </a>
                <i class="fa-solid fa-layer-group"></i>
                <h1>Encuentra<span> Ya</span></h1>
            </div>
            <div class="brand-header-actions">
                <a href="/register" class="btn-register-header" id="headerRegister" title="Registra tu Comercio">
                    <i class="fa-solid fa-rocket"></i> <span>Registrar</span>
                </a>
                <button class="btn-toggle-sidebar-trigger" id="btnToggleSidebar" title="Ocultar panel">
                    <i class="fa-solid fa-eye-slash"></i>
                </button>
            </div>
        </div>
        
        <div class="content-tabs">
            <div class="section-title">
                <i class="fa-solid fa-store"></i>
                <span>Comercios Verificados</span>
            </div>

            <div class="info-note">
                <i class="fa-solid fa-circle-info"></i>
                <span>Haz clic en un marcador del mapa o en un comercio de la lista para ver sus detalles, productos y métodos de pago.</span>
            </div>

            <div id="storeList" class="store-list">
                <p style="color: var(--text-muted); font-size: 13px;">Cargando comercios...</p>
            </div>

            <a href="/register" class="cta-register" id="ctaRegister">
                <i class="fa-solid fa-rocket"></i> Registra tu Comercio
            </a>
        </div>

        <div class="stats-bar">
            <span><span class="count" id="storeCount">0</span> comercios activos</span>
            <span><i class="fa-solid fa-signal"></i> En línea</span>
        </div>
    </div>

    <div id="map" style="position: relative;">
        <button class="btn-my-location" id="btnMyLocation" title="Ir a mi ubicación">
            <i class="fa-solid fa-location-crosshairs"></i>
        </button>
        <button class="btn-map-toggle-sidebar" id="btnMapToggleSidebar" title="Mostrar panel">
            <i class="fa-solid fa-eye"></i>
        </button>
    </div>

    <!-- Lightbox de Logo -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <span class="close-lightbox">&times;</span>
        <img id="lightbox-img" src="" alt="Logo ampliado" />
    </div>

    <!-- Modal de Detalles de Producto -->
    <div id="product-modal" class="product-modal-overlay" onclick="closeProductModal()">
        <div class="product-modal-card" onclick="event.stopPropagation()">
            <span class="product-modal-close" onclick="closeProductModal()">&times;</span>
            <img id="prod-modal-img" src="" alt="Imagen de producto" style="cursor: pointer;" title="Ver imagen completa" onclick="openLogoLightbox(this.src)" onerror="this.src='https://via.placeholder.com/300/1e293b/94a3b8?text=SIN+IMAGEN'" />
            <div class="product-modal-info">
                <h3 id="prod-modal-name"></h3>
                <span id="prod-modal-cat" class="product-modal-badge"></span>
                <p id="prod-modal-desc"></p>
                <div class="product-modal-footer">
                    <span id="prod-modal-price" class="product-modal-price"></span>
                    <span id="prod-modal-stock" class="product-modal-stock"></span>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Inicializar mapa centrado en San Juan de los Morros, Guárico, Venezuela
        const map = L.map('map', { zoomControl: false }).setView([9.9110, -67.3550], 14); 
        
        L.control.zoom({ position: 'topright' }).addTo(map);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© Encuentra Ya Global Ecosystem'
        }).addTo(map);

        // Icono personalizado de tienda (negro con ícono de store y nombre encima)
        function createStoreIcon(storeName) {
            return L.divIcon({
                className: '',
                html: `
                    <div class="store-marker">
                        <div class="store-marker-label">${storeName}</div>
                        <div class="store-marker-icon">
                            <i class="fa-solid fa-store"></i>
                        </div>
                    </div>
                `,
                iconSize: [40, 56],
                iconAnchor: [20, 56],
                popupAnchor: [0, -58]
            });
        }

        // Icono de ubicación del usuario (punto azul pulsante)
        const userLocationIcon = L.divIcon({
            className: '',
            html: '<div class="user-location-marker"></div>',
            iconSize: [20, 20],
            iconAnchor: [10, 10]
        });

        let userLocationMarker = null;

        function buildContactHtml(comercio) {
            let html = '<div class="contact-links">';
            
            if (comercio.contacto_whatsapp) {
                let waNum = comercio.contacto_whatsapp.replace(/[^0-9]/g, '');
                // Sanitizar número: WhatsApp requiere código internacional (ej: 58 para Venezuela) y sin el 0 inicial
                if (waNum.startsWith('0')) {
                    waNum = '58' + waNum.substring(1);
                } else if (!waNum.startsWith('58') && waNum.length === 10) {
                    waNum = '58' + waNum;
                }
                const waText = encodeURIComponent("Hola. Me gustaria mas informacion");
                
                // Formatear el número para mostrarlo bonito en el botón del teléfono
                let formattedNumber = comercio.contacto_whatsapp;
                
                html += `<a href="https://wa.me/${waNum}?text=${waText}" target="_blank" class="contact-btn contact-btn-phone">
                    <i class="fa-solid fa-phone"></i> ${formattedNumber}
                </a>`;
            }
            if (comercio.contacto_instagram) {
                const igHandle = comercio.contacto_instagram.replace('@', '');
                html += `<a href="https://instagram.com/${igHandle}" target="_blank" class="contact-btn contact-btn-instagram">
                    <i class="fa-brands fa-instagram"></i> ${comercio.contacto_instagram}
                </a>`;
            }
            if (comercio.correo) {
                html += `<a href="mailto:${comercio.correo}" class="contact-btn contact-btn-email">
                    <i class="fa-solid fa-envelope"></i> Correo
                </a>`;
            }

            html += '</div>';
            return html;
        }

        function buildProductsHtml(productos) {
            if (!productos || productos.length === 0) {
                return '<p class="popup-no-products">Este comercio aún no ha publicado productos.</p>';
            }

            let html = '<div class="popup-products">';
            productos.forEach(p => {
                html += `
                    <div class="popup-product-card" style="cursor: pointer;" onclick="openProductModal(${p.id})" title="Hacer clic para ver detalles">
                        <img src="${p.imagen || 'https://via.placeholder.com/110x70'}" alt="${p.nombre}" onerror="this.src='https://via.placeholder.com/110x70/1e293b/94a3b8?text=IMG'">
                        <div class="prod-info">
                            <div class="prod-name">${p.nombre}</div>
                            <div class="prod-price">$${Number(p.precio).toLocaleString()}</div>
                        </div>
                    </div>`;
            });
            html += '</div>';
            return html;
        }

        function buildPopupHtml(comercio) {
            const plataformasBadges = comercio.plataformas.map(p => `<span class="badge badge-platform">${p}</span>`).join('');
            const monedasBadges = comercio.monedas.map(m => `<span class="badge badge-crypto">${m}</span>`).join('');

            return `
                <div class="popup-card">
                    <div class="popup-header">
                        <img src="${comercio.logo}" alt="${comercio.nombre}" class="popup-logo" onclick="openLogoLightbox('${comercio.logo}')" onerror="this.src='https://via.placeholder.com/56/1e293b/00ffa3?text=?'" title="Clic para ampliar logo">
                        <div class="popup-header-info">
                            <h3><i class="fa-solid fa-circle-check" style="font-size:12px"></i> ${comercio.nombre}</h3>
                            <div class="popup-rif">${comercio.rif || ''}</div>
                            <div class="popup-desc">${comercio.descripcion || ''}</div>
                        </div>
                    </div>

                    <div class="popup-section">
                        <div class="popup-section-title">Pasarelas / Canales de Pago</div>
                        <div class="badge-container">${plataformasBadges || '<span style="color:#94a3b8;font-size:11px">No especificado</span>'}</div>
                    </div>

                    <div class="popup-section">
                        <div class="popup-section-title">Activos & Divisas Aceptadas</div>
                        <div class="badge-container">${monedasBadges || '<span style="color:#94a3b8;font-size:11px">No especificado</span>'}</div>
                    </div>

                    <div class="popup-section">
                        <div class="popup-section-title">Contacto Directo</div>
                        ${buildContactHtml(comercio)}
                    </div>

                    <div class="popup-section" style="border-bottom: none;">
                        <div class="popup-section-title">Productos a la Venta (${comercio.productos ? comercio.productos.length : 0})</div>
                        ${buildProductsHtml(comercio.productos)}
                    </div>
                </div>`;
        }

        function buildSidebarCard(comercio) {
            const monedasBadges = comercio.monedas.slice(0, 4).map(m => `<span class="mini-badge mini-badge-crypto">${m}</span>`).join('');

            return `
                <div class="store-card" onclick="flyToStore(${comercio.ubicacion.coordinates[1]}, ${comercio.ubicacion.coordinates[0]}, ${comercio._id})">
                    <img src="${comercio.logo}" alt="${comercio.nombre}" class="store-card-logo" onerror="this.src='https://via.placeholder.com/50/1e293b/00ffa3?text=?'">
                    <div class="store-card-info">
                        <h3>${comercio.nombre}</h3>
                        <p>${comercio.descripcion || 'Sin descripción.'}</p>
                        <div class="store-card-badges">${monedasBadges}</div>
                    </div>
                </div>`;
        }

        let markers = {};

        function flyToStore(lat, lng, id) {
            const offset = 0.0015;
            map.flyTo([lat + offset, lng], 17, { duration: 1 });
            if (markers[id]) {
                markers[id].openPopup();
            }
        }

        function checkQueryParamsAndFocus() {
            const urlParams = new URLSearchParams(window.location.search);
            const storeId = urlParams.get('storeId');
            const lat = parseFloat(urlParams.get('lat'));
            const lng = parseFloat(urlParams.get('lng'));

            if (storeId && !isNaN(lat) && !isNaN(lng)) {
                setTimeout(() => {
                    flyToStore(lat, lng, storeId);
                }, 600);
            }
        }

        async function cargarComercios() {
            try {
                const res = await fetch('/api/comercios');
                const comercios = await res.json();

                // Registrar productos en un mapa global para poder visualizarlos al hacer clic
                window.allProductsMap = {};
                comercios.forEach(comercio => {
                    if (comercio.productos) {
                        comercio.productos.forEach(p => {
                            window.allProductsMap[p.id] = p;
                        });
                    }
                });

                // Limpiar marcadores existentes
                Object.values(markers).forEach(m => map.removeLayer(m));
                markers = {};

                // Actualizar sidebar
                const storeList = document.getElementById('storeList');
                const storeCount = document.getElementById('storeCount');
                storeCount.textContent = comercios.length;

                if (comercios.length === 0) {
                    storeList.innerHTML = '<p style="color: var(--text-muted); font-size: 13px; text-align: center;">No hay comercios registrados aún. ¡Sé el primero!</p>';
                } else {
                    storeList.innerHTML = comercios.map(c => buildSidebarCard(c)).join('');
                }

                // Crear marcadores en el mapa
                comercios.forEach(comercio => {
                    const [longitud, latitud] = comercio.ubicacion.coordinates;
                    const storeIcon = createStoreIcon(comercio.nombre);
                    const marker = L.marker([latitud, longitud], { icon: storeIcon }).addTo(map);
                    marker.bindPopup(buildPopupHtml(comercio), { maxWidth: 360, minWidth: 320 });
                    markers[comercio._id] = marker;
                });

                // Auto enfocar comercio si viene en los query params
                checkQueryParamsAndFocus();

            } catch (err) {
                console.error("Error conectando con la API:", err);
                document.getElementById('storeList').innerHTML = '<p style="color: var(--danger); font-size: 13px;">Error al conectar con el servidor.</p>';
            }
        }

        function openLogoLightbox(url) {
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            img.src = url;
            lightbox.classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        function openProductModal(productId) {
            const product = window.allProductsMap[productId];
            if (!product) return;

            document.getElementById('prod-modal-img').src = product.imagen || 'https://via.placeholder.com/300/1e293b/94a3b8?text=SIN+IMAGEN';
            document.getElementById('prod-modal-name').textContent = product.nombre;
            document.getElementById('prod-modal-cat').textContent = `Categoría: ${product.categoria}`;
            document.getElementById('prod-modal-desc').textContent = product.descripcion || 'Sin descripción.';
            document.getElementById('prod-modal-price').textContent = `$${Number(product.precio).toLocaleString()}`;
            document.getElementById('prod-modal-stock').textContent = `Stock: ${product.stock}`;

            document.getElementById('product-modal').classList.add('active');
        }

        function closeProductModal() {
            document.getElementById('product-modal').classList.remove('active');
        }

        // --- BOTÓN MI UBICACIÓN ---
        const btnMyLocation = document.getElementById('btnMyLocation');

        btnMyLocation.addEventListener('click', () => {
            if (!navigator.geolocation) {
                alert('Tu navegador no soporta geolocalización.');
                return;
            }

            btnMyLocation.classList.add('locating');

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const { latitude, longitude } = position.coords;

                    // Remover marcador anterior si existe
                    if (userLocationMarker) {
                        map.removeLayer(userLocationMarker);
                    }

                    // Crear marcador de ubicación del usuario
                    userLocationMarker = L.marker([latitude, longitude], { icon: userLocationIcon }).addTo(map);
                    userLocationMarker.bindPopup('<div style="font-family: Plus Jakarta Sans, sans-serif; padding: 6px; font-size: 13px; font-weight: 600; color: #3b82f6;"><i class="fa-solid fa-location-dot"></i> Estás aquí</div>');

                    // Volar a la ubicación
                    map.flyTo([latitude, longitude], 16, { duration: 1.5 });
                    userLocationMarker.openPopup();

                    btnMyLocation.classList.remove('locating');
                },
                (error) => {
                    btnMyLocation.classList.remove('locating');
                    let msg = 'No se pudo obtener tu ubicación.';
                    if (error.code === 1) msg = 'Permiso de ubicación denegado. Habilita la ubicación en tu navegador.';
                    if (error.code === 2) msg = 'Ubicación no disponible.';
                    if (error.code === 3) msg = 'Tiempo de espera agotado.';
                    alert(msg);
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 30000 }
            );
        });

        // --- CONTROL DE OCULTAR/MOSTRAR SIDEBAR ---
        const sidebar = document.getElementById('sidebar');
        const btnToggleSidebar = document.getElementById('btnToggleSidebar');
        const btnMapToggleSidebar = document.getElementById('btnMapToggleSidebar');

        function toggleSidebar() {
            sidebar.classList.toggle('collapsed');
            const isCollapsed = sidebar.classList.contains('collapsed');
            
            // Actualizar icono en la cabecera
            const toggleIcon = btnToggleSidebar.querySelector('i');
            if (isCollapsed) {
                toggleIcon.className = 'fa-solid fa-eye';
                btnToggleSidebar.title = 'Mostrar panel';
                
                // Mostrar botón flotante en el mapa solo en pantallas de escritorio
                if (window.innerWidth > 768) {
                    btnMapToggleSidebar.style.display = 'flex';
                }
            } else {
                toggleIcon.className = 'fa-solid fa-eye-slash';
                btnToggleSidebar.title = 'Ocultar panel';
                btnMapToggleSidebar.style.display = 'none';
            }
            
            // Invalidar tamaño del mapa para reajustar Leaflet tras transiciones CSS
            setTimeout(() => {
                map.invalidateSize();
            }, 350);
        }

        btnToggleSidebar.addEventListener('click', toggleSidebar);
        btnMapToggleSidebar.addEventListener('click', toggleSidebar);

        // Ocultar botón flotante de mapa en móviles al cambiar tamaño de pantalla
        window.addEventListener('resize', () => {
            const isCollapsed = sidebar.classList.contains('collapsed');
            if (isCollapsed && window.innerWidth <= 768) {
                btnMapToggleSidebar.style.display = 'none';
            } else if (isCollapsed && window.innerWidth > 768) {
                btnMapToggleSidebar.style.display = 'flex';
            }
        });

        // Cargar comercios al iniciar
        cargarComercios();
    </script>
</body>
</html>
